<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tower Defense</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="game"></canvas>

<div class="ui-overlay">
  <div class="ui-panel ui-top-left">
    <div>Score: <span id="ui-score">0</span></div>
    <div>Wave: <span id="ui-wave">0 / 0</span></div>
    <div>Tier: <span id="ui-tier">-</span></div>
  </div>

  <div class="ui-panel ui-top-right">
    <div>FPS: <span id="ui-fps">0</span></div>
  </div>

  <div class="ui-panel ui-base-health">
    <div class="ui-bar-track">
      <div id="ui-base-fill" class="ui-bar-fill"></div>
    </div>
    <div id="ui-base-text" class="ui-base-text">0 / 0</div>
  </div>

  <div id="ui-banner" class="ui-banner" hidden></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
